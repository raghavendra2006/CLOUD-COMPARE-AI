# ==========================================
# OVER-EXCELLENCE PERFORMANCE CONFIGURATION
# ==========================================

# Server Configuration
server.port=5000

# ✅ 1. Virtual Threads (Project Loom - Massive Concurrency)
spring.threads.virtual.enabled=true

# ✅ 2. Payload Compression (GZIP)
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=2048

# Groq API Configuration
grok.api.keys=${GROK_API_KEYS:}
grok.endpoint=https://api.groq.com/openai/v1/chat/completions
grok.model=llama-3.1-8b-instant
grok.timeout=20000
grok.max-retries=2

# Static resources
spring.web.resources.static-locations=classpath:/static/

# ✅ 3. Database Connection Pooling (HikariCP Tuning)
# Default to local/in-memory usage for easier dev startup.
# Use environment variables to switch back to MySQL:
#   DB_HOST, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:h2:mem:cloudcompare-ai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:cloudcompare-ai-over-excellence-secret-key-2026-production}
jwt.expiration=86400000

# ✅ 4. Resilience4J Circuit Breaker Config
resilience4j.circuitbreaker.instances.groqApi.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.groqApi.slidingWindowSize=10
resilience4j.circuitbreaker.instances.groqApi.failureRateThreshold=50
resilience4j.circuitbreaker.instances.groqApi.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.groqApi.permittedNumberOfCallsInHalfOpenState=3

# ✅ 5. Resilience4J Retry Config
resilience4j.retry.instances.groqApi.maxAttempts=3
resilience4j.retry.instances.groqApi.waitDuration=2s
resilience4j.retry.instances.groqApi.retryExceptions[0]=java.util.concurrent.TimeoutException
resilience4j.retry.instances.groqApi.retryExceptions[1]=java.net.http.HttpTimeoutException
resilience4j.retry.instances.groqApi.retryExceptions[2]=java.io.IOException
