services:
  app:
    build: .
    container_name: cloudcompare-ai
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_NAME=cloudcompare
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - GROK_API_KEYS=${GROK_API_KEYS}
      - JWT_SECRET=${JWT_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
